<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>

  <!--
    Inject Jinja2 dynamic values as CSS custom properties via JavaScript.
    This keeps the <style> block below as valid CSS (no template syntax inside),
    which prevents VS Code's CSS linter from raising errors.
  -->
  <script>
    document.documentElement.style.setProperty('--bg-color',     '{{ bg_color }}');
    document.documentElement.style.setProperty('--accent-color', '{{ accent_color }}');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: var(--bg-color, #eef2ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 620px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .icon { font-size: 64px; margin-bottom: 20px; }

    h1 {
      font-size: 2rem;
      color: #1e1e2e;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .message {
      font-size: 1.15rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      background-color: var(--accent-color, #4f46e5);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }

    .info-box {
      background: #f5f5ff;
      border-left: 5px solid var(--accent-color, #4f46e5);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      text-align: left;
      font-size: 0.9rem;
      color: #444;
      line-height: 1.6;
    }

    .info-box strong { color: var(--accent-color, #4f46e5); }
    code {
      background: #e9e9f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚀</div>
    <h1>{{ title }}</h1>
    <p class="message">{{ message }}</p>
    <span class="badge">Version {{ version }}</span>
    <div class="info-box">
      <strong>Config Source:</strong> Environment Variables<br />
      Values injected via <code>env:</code> in the K8s Deployment spec.
    </div>
  </div>
</body>
</html>
