# ─────────────────────────────────────────────────────────────────────────────
# Task 1 – Expose the Deployment via a NodePort Service
# Apply:  kubectl apply -f k8s/01-create/service.yaml
# Access: http://<node-ip>:30080
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: webapp
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx          # routes to every pod that carries this label
  ports:
    - protocol: TCP
      port: 80          # service port (cluster-internal)
      targetPort: 80    # container port
      nodePort: 30080   # externally reachable port on every node
