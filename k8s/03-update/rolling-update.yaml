# =============================================================================
# Task 3a – Rolling Update  (strategy: RollingUpdate)
#
# How it works:
#   New pods are brought up BEFORE old ones are removed, so the service
#   is never fully down.  maxSurge / maxUnavailable control the speed.
#
# Apply:
#   kubectl apply -f k8s/03-update/rolling-update.yaml
#
# Watch the rollout live:
#   kubectl rollout status deployment/nginx-deployment -n webapp
#   kubectl get pods -n webapp -w
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: webapp
  labels:
    app: nginx
    version: "1.25"
  annotations:
    kubernetes.io/change-cause: "Rolling update – nginx:1.24 → nginx:1.25 (RollingUpdate strategy)"
spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  # ── RollingUpdate strategy ─────────────────────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # allow one extra pod above desired count
      maxUnavailable: 0  # keep all desired pods serving traffic

  template:
    metadata:
      labels:
        app: nginx
        version: "1.25"
    spec:
      containers:
        - name: nginx
          image: nginx:1.25          # ← updated image version
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
