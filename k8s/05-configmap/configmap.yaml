# =============================================================================
# Task 5 – Modify the Nginx welcome page via a ConfigMap
#
# The entire index.html is stored as a ConfigMap key.
# The Deployment mounts it over /usr/share/nginx/html/index.html.
# No custom Docker image is required.
#
# Apply both files together:
#   kubectl apply -f k8s/05-configmap/
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html-config
  namespace: webapp
  labels:
    app: nginx
    demo: configmap
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Nginx App – ConfigMap Demo</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: "Segoe UI", Arial, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 20px;
        }
        .card {
          background: #fff;
          border-radius: 16px;
          padding: 48px 40px;
          max-width: 620px;
          width: 100%;
          text-align: center;
          box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #1e1e2e; margin-bottom: 16px; }
        .subtitle { color: #666; font-size: 1.1rem; margin-bottom: 24px; line-height: 1.6; }
        .badge {
          display: inline-block;
          background: #667eea;
          color: #fff;
          font-weight: 700;
          font-size: 0.85rem;
          padding: 6px 20px;
          border-radius: 999px;
          margin-bottom: 28px;
        }
        .info-box {
          background: #f0f0ff;
          border-left: 5px solid #667eea;
          border-radius: 0 8px 8px 0;
          padding: 14px 18px;
          text-align: left;
          font-size: 0.9rem;
          color: #444;
          line-height: 1.7;
        }
        code {
          background: #e0e0f5;
          padding: 2px 6px;
          border-radius: 4px;
          font-size: 0.85em;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="icon">🗺️</div>
        <h1>Welcome to Nginx App</h1>
        <p class="subtitle">
          This page was customised using a <strong>Kubernetes ConfigMap</strong>
        </p>
        <span class="badge">ConfigMap Demo</span>
        <div class="info-box">
          <strong>How it works:</strong><br />
          The HTML is stored in a <code>ConfigMap</code> key <code>index.html</code>
          and mounted as a file at <code>/usr/share/nginx/html/index.html</code>
          inside the Nginx container using a <code>volumeMount</code>.
          No custom Docker image is needed.
        </div>
      </div>
    </body>
    </html>
