# =============================================================================
# Task 6 – Deployment that mounts the Secret as Nginx's welcome page
# Apply:  kubectl apply -f k8s/06-secret/
# Access: kubectl port-forward svc/nginx-secret-svc 8082:80 -n webapp
#         → open http://localhost:8082
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-secret-demo
  namespace: webapp
  labels:
    app: nginx-secret
    demo: secret
  annotations:
    kubernetes.io/change-cause: "Custom welcome page served from Secret"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-secret
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx-secret
        demo: secret
    spec:
      containers:
        - name: nginx
          image: nginx:1.24
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

          # ── Mount the Secret key as a file ──────────────────────────────────
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
              readOnly: true

      volumes:
        - name: html-volume
          secret:
            secretName: nginx-html-secret   # must match Secret metadata.name
            defaultMode: 0400              # owner read-only permissions
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-secret-svc
  namespace: webapp
  labels:
    app: nginx-secret
    demo: secret
spec:
  type: ClusterIP
  selector:
    app: nginx-secret
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
