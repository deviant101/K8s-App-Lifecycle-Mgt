# =============================================================================
# Task 6 – Modify the Nginx welcome page via a Kubernetes Secret
#
# Secrets are base64-encoded at rest.  We use `stringData:` here so we can
# write plain HTML in the manifest – Kubernetes encodes it automatically.
#
# NOTE: By default K8s Secrets are NOT encrypted in etcd.  In production,
# enable EncryptionConfiguration or use an external secrets manager (Vault,
# AWS Secrets Manager, etc.).
#
# Apply both files together:
#   kubectl apply -f k8s/06-secret/
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: nginx-html-secret
  namespace: webapp
  labels:
    app: nginx-secret
    demo: secret
type: Opaque

# stringData lets you write plain text; K8s stores it base64-encoded
stringData:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Nginx App – Secret Demo</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: "Segoe UI", Arial, sans-serif;
          background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 20px;
        }
        .card {
          background: #fff;
          border-radius: 16px;
          padding: 48px 40px;
          max-width: 620px;
          width: 100%;
          text-align: center;
          box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #1e1e2e; margin-bottom: 16px; }
        .subtitle { color: #666; font-size: 1.1rem; margin-bottom: 24px; line-height: 1.6; }
        .badge {
          display: inline-block;
          background: #f5576c;
          color: #fff;
          font-weight: 700;
          font-size: 0.85rem;
          padding: 6px 20px;
          border-radius: 999px;
          margin-bottom: 28px;
        }
        .info-box {
          background: #fff0f3;
          border-left: 5px solid #f5576c;
          border-radius: 0 8px 8px 0;
          padding: 14px 18px;
          text-align: left;
          font-size: 0.9rem;
          color: #444;
          line-height: 1.7;
        }
        .warning {
          background: #fff8e1;
          border-left: 5px solid #ffc107;
          border-radius: 0 8px 8px 0;
          padding: 12px 18px;
          text-align: left;
          font-size: 0.85rem;
          color: #555;
          margin-top: 16px;
          line-height: 1.7;
        }
        code {
          background: #f5e0e3;
          padding: 2px 6px;
          border-radius: 4px;
          font-size: 0.85em;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="icon">🔐</div>
        <h1>Welcome to Nginx App</h1>
        <p class="subtitle">
          This page was customised using a <strong>Kubernetes Secret</strong>
        </p>
        <span class="badge">Secret Demo</span>
        <div class="info-box">
          <strong>How it works:</strong><br />
          The HTML is stored in a <code>Secret</code> (base64-encoded) and mounted
          as a file at <code>/usr/share/nginx/html/index.html</code>
          via a <code>volumeMount</code> with <code>defaultMode: 0444</code>
          (read-only for all users in the container).
        </div>
        <div class="warning">
          ⚠️ <strong>Production note:</strong> K8s Secrets are not encrypted by default.
          Enable <em>EncryptionConfiguration</em> or use an external secrets manager
          (HashiCorp Vault, AWS Secrets Manager, etc.) in production environments.
        </div>
      </div>
    </body>
    </html>
