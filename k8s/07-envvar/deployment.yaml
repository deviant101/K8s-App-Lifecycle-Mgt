# =============================================================================
# Task 7 – Modify the welcome page via Environment Variables
#
# Two approaches are shown:
#
#   Approach A (no custom image):
#     Uses an initContainer (busybox) that reads env vars and writes
#     index.html to a shared emptyDir volume before Nginx starts.
#
# Apply:
#   kubectl apply -f k8s/07-envvar/deployment.yaml
# Access:
#   Nginx envvar demo: http://<NODE_IP>:30083
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-envvar-demo
  namespace: webapp
  labels:
    app: nginx-envvar
    demo: envvar
  annotations:
    kubernetes.io/change-cause: "Welcome page generated from Environment Variables (initContainer)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-envvar
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx-envvar
        demo: envvar
    spec:
      # ── initContainer: generate index.html from env vars ─────────────────
      initContainers:
        - name: html-generator
          image: busybox:1.36
          env:
            - name: PAGE_TITLE
              value: "Nginx App – Environment Variables"
            - name: WELCOME_MESSAGE
              value: "This page was generated at pod start-up from Environment Variables!"
            - name: APP_VERSION
              value: "1.0"
            - name: ACCENT_COLOR
              value: "#10b981"
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat > /html/index.html <<HTMLEOF
              <!DOCTYPE html>
              <html lang="en">
              <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>${PAGE_TITLE}</title>
                <style>
                  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
                  body{font-family:"Segoe UI",Arial,sans-serif;background:#f0fdf4;
                    min-height:100vh;display:flex;justify-content:center;
                    align-items:center;padding:20px}
                  .card{background:#fff;border-radius:16px;padding:48px 40px;
                    max-width:620px;width:100%;text-align:center;
                    box-shadow:0 8px 32px rgba(0,0,0,.12)}
                  .icon{font-size:64px;margin-bottom:20px}
                  h1{font-size:2rem;color:#1e1e2e;margin-bottom:16px}
                  .msg{color:#555;font-size:1.1rem;line-height:1.7;margin-bottom:24px}
                  .badge{display:inline-block;background:${ACCENT_COLOR};color:#fff;
                    font-weight:700;font-size:.85rem;padding:6px 20px;
                    border-radius:999px;margin-bottom:28px}
                  .info{background:#f0fdf4;border-left:5px solid ${ACCENT_COLOR};
                    border-radius:0 8px 8px 0;padding:14px 18px;text-align:left;
                    font-size:.9rem;color:#444;line-height:1.7}
                  code{background:#d1fae5;padding:2px 6px;border-radius:4px;font-size:.85em}
                </style>
              </head>
              <body>
                <div class="card">
                  <div class="icon">⚙️</div>
                  <h1>${PAGE_TITLE}</h1>
                  <p class="msg">${WELCOME_MESSAGE}</p>
                  <span class="badge">Version ${APP_VERSION}</span>
                  <div class="info">
                    <strong>How it works:</strong><br/>
                    An <code>initContainer</code> (busybox) reads <code>env:</code> vars
                    and writes <code>index.html</code> to a shared <code>emptyDir</code>
                    volume before Nginx starts.  No custom Docker image is required.
                  </div>
                </div>
              </body>
              </html>
              HTMLEOF
          volumeMounts:
            - name: html-volume
              mountPath: /html

      # ── Main Nginx container: serves the generated file ──────────────────
      containers:
        - name: nginx
          image: nginx:1.24
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

      volumes:
        - name: html-volume
          emptyDir: {}    # shared between initContainer and nginx container

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-envvar-svc
  labels:
    app: nginx-envvar
    demo: envvar
spec:
  type: NodePort
  selector:
    app: nginx-envvar
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30083
